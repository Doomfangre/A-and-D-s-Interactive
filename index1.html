// THANK YOU FAST FOR HELPING ME ON THIS PART!!!!! - Dillan
function buildChoices(storyObject){
    if (storyObject.choices.length === 0) { //if the choices array is empty
        let newBtn = document.createElement('button');
            newBtn.innerText = "Begin the Adventure";
            newBtn.addEventListener('click', () => {
                startStory();
            })
        choiceCont.appendChild(newBtn);
    } else { //assume there are choices to make
        for(let choice of storyObject.choices){
            let newBtn = document.createElement('button');
            newBtn.innerText = choice[0]; // show the text in index 0
            newBtn.addEventListener('click', () => {
                myStory.push(choice[1]) // push the story key ine index 1
                console.log('Story Array', myStory); // log story array
                renderStory();
//----------------> call story render function here

            })
            choiceCont.appendChild(newBtn);
        }
    }
}

function startStory() {
    myStory.push(startOptions[Math.floor(Math.random() * startOptions.length)]); //randomize starter beginning
    console.log('Story Array', myStory); //log story array
    renderStory();
    //call render story function here
}





function renderStory() {
    //cureent scene of the story array
    let currentScene = myStory[myStory.length - 1];
    // Empty the story and choices
    storyCont.innerHTML = "";
    choiceCont.innerHTML = "";

//This builds the story into the story array
 for (let scene of myStory) {
        let storyText = document.createElement("p");
        storyText.innerText = story[scene].text;
        storyCont.appendChild(storyText);
    }
    //Builds the buttons for the current scene the user on
    buildChoices(story[currentScene]);
}
renderStory();
