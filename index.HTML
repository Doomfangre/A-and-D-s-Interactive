<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="style.css" rel="stylesheet"/>
</head>

<body>
    <container class="Test">

        <h1>Hymn of Daedalus</h1>

        

        
        <div id="main-box">
        <section>
            <label>Aura</label>
            <progress id="Aura" value="50" max="100" value="10"></progress>
        </section>
            <div id="box"></div>
            <div id="Inventory"><img src="invent.png" class="boxes"></div>
        </div>

    </container>
    
</body>
<script>
const storyCont = document.getElementById("story")
const choiceCont = document.getElementById("choices")
const startOptions = ["spider","shore","village"]
const myStory = ['introStory']
const story = {

introStory : {
    text : "Up above the clouds, there is a kingdom in which you play as our main protagonist. Sora, the prince and heir to the king. You reside in the living castle along with your mother and younger sister. One day, your younger sister disappears, and for a week your parents are restlessly searching for her. Until eventually she is found and returned. However, you notice a change in your sister's behavior but don't think much of it. Tragically, only a week later, the parents, who are the king and queen, were found deceased due to an unknown cause. In the kings will, you were supposed to become the new ruler of the kingdom. However, the head royal guard declared your sister to be the ruler of the kingdom. The head guard explained to the public how the deaths of the king, queen, and the heir to the throne were tragic. He explained that the bloodline will live through the soon to be queen of the living castle. Confused, he confronts his sister, however his sister is not the same as she was before her disappearance. She had become significantly stronger and when you confronted her, she had a weapon in her hand. You were beaten almost to the brink of death, and was slowly losing consciousness as you were dragged to the edge of the clouds. She explains how she was the one who ended their parents and how now she will end you. She then kicks you off the edge of the clouds. You lose consciousness from the power kick and rapidly fall down to the earth, unknowingly starting your journey.", 
    choices : [] // empty to invoke special logic 
},

}

// THANK YOU FAST FOR HELPING ME ON THIS PART!!!!! - Dillan
function buildChoices(storyObject){
    if (storyObject.choices.length === 0) { //if the choices array is empty
        let newBtn = document.createElement('button');
            newBtn.innerText = "Begin the Adventure";
            newBtn.addEventListener('click', () => {
                startStory();
            })
        choiceCont.appendChild(newBtn);
    } else { //assume there are choices to make
        for(let choice of storyObject.choices){
            let newBtn = document.createElement('button');
            newBtn.innerText = choice[0]; // show the text in index 0
            newBtn.addEventListener('click', () => {
                myStory.push(choice[1]) // push the story key ine index 1
                console.log('Story Array', myStory); // log story array
                renderStory();
//----------------> call story render function here

            })
            choiceCont.appendChild(newBtn);
        }
    }
}

function startStory() {
    myStory.push(startOptions[Math.floor(Math.random() * startOptions.length)]); //randomize starter beginning
    console.log('Story Array', myStory); //log story array
    renderStory();
    //call render story function here
}





function renderStory() {
    //cureent scene of the story array
    let currentScene = myStory[myStory.length - 1];
    // Empty the story and choices
    storyCont.innerHTML = "";
    choiceCont.innerHTML = "";

//This builds the story into the story array
 for (let scene of myStory) {
        let storyText = document.createElement("p");
        storyText.innerText = story[scene].text;
        storyCont.appendChild(storyText);
    }
    //Builds the buttons for the current scene the user on
    buildChoices(story[currentScene]);
}
renderStory();




</script>
</html>
